---
- name: Install base prerequisites
  ansible.builtin.package:
    name: '{{ item }}'
    state: present
  loop:
    - epel-release
    - dnf
    - which
    - wget
    - git
- name: Enable crb
  community.general.dnf_config_manager:
    name: crb
    state: enabled
- name: Install pgEdge repository
  ansible.builtin.package:
    name: https://dnf.pgedge.com/reporpm/pgedge-release-latest.noarch.rpm
    state: present
    disable_gpg_check: true
- name: Add pgEdge old repository
  ansible.builtin.yum_repository:
    name: pgedge-old
    description: pgEdge Old RPM Repository
    baseurl: "https://dnf.pgedge.com/release_old/{{ansible_facts['distribution_major_version']}}/RPMS/{{ansible_facts['architecture']}}/"
    # We only host one version of our GPG keys and its invalid for these old
    # packages.
    gpgcheck: no
    enabled: yes
    sslverify: yes
- name: Add pgEdge noarch old repository
  ansible.builtin.yum_repository:
    name: pgedge-noarch-old
    description: pgEdge Old RPM Repository (noarch)
    baseurl: "https://dnf.pgedge.com/release_old/{{ansible_facts['distribution_major_version']}}/RPMS/noarch/"
    gpgcheck: no
    enabled: yes
    sslverify: yes
- name: Reconfigure pgEdge repository for staging packages
  ansible.builtin.replace:
    path: /etc/yum.repos.d/pgedge.repo
    regexp: release
    replace: staging
  when: use_staging_packages | bool
  register: repo_reconfigured_to_staging
- name: Reconfigure pgEdge repository for release packages
  ansible.builtin.replace:
    path: /etc/yum.repos.d/pgedge.repo
    regexp: staging
    replace: release
  when: not (use_staging_packages | bool)
  register: repo_reconfigured_to_release
- name: Remove pgEdge packages for reinstall
  ansible.builtin.package:
    name: '{{ item }}'
    state: absent
  loop: '{{ pgedge_packages }}'
  when: repo_reconfigured_to_staging.changed or repo_reconfigured_to_release.changed
- name: Install pgEdge packages
  ansible.builtin.package:
    name: '{{ item }}'
    state: present
  loop: '{{ pgedge_packages }}'
- name: Install etcdctl and etcdutl
  ansible.builtin.unarchive:
    src: "{{ etcd_download_url }}"
    dest: /usr/bin
    remote_src: yes
    extra_opts:
      - "--strip-components=1"
      - "{{ etcd_archive_name }}/etcdctl"
      - "{{ etcd_archive_name }}/etcdutl"
    creates: /usr/bin/etcdctl
- name: Install Go
  ansible.builtin.unarchive:
    src: "{{ go_download_url }}"
    dest: /usr/local
    remote_src: yes
    creates: /usr/local/go
- name: Add profile environment
  ansible.builtin.copy:
    content: |
      export PATH=$PATH:/usr/local/go/bin
    dest: /etc/profile.d/control-plane-dev.sh
    mode: '0755'
- name: Allow large time jumps in chronyd
  ansible.builtin.lineinfile:
    path: /etc/chrony.conf
    regexp: '^makestep'
    line: 'makestep 1 -1'
  register: chronycfg
- name: Restart chronyd
  ansible.builtin.systemd_service:
    name: chronyd
    state: restarted
  when: chronycfg.changed
- name: Install delve debugger
  ansible.builtin.command: /usr/local/go/bin/go install github.com/go-delve/delve/cmd/dlv@v1.25.2
  args:
    creates: /root/go/bin/dlv
- name: Fix clocks
  ansible.builtin.command: chronyc -a makestep
  changed_when: false
