---
- include_tasks: ../../../../e2e/fixtures/roles/lima_common/tasks/list.yaml

- name: Create hosts
  loop: '{{ machines }}'
  command: limactl start --yes --name={{ item.name }} lima-template.yaml
  when: item.name not in lima_vms

- name: Start stopped hosts
  loop: '{{ machines }}'
  command: limactl start --name={{ item.name }}
  when: item.name in lima_vms and lima_vms[item.name].status != 'Running'
