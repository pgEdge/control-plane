[circus]

[watcher:host-1]
cmd = ssh 
args = -F $(CIRCUS.ENV.HOME)/.lima/control-plane-dev-1/ssh.config -tt lima-control-plane-dev-1 'sudo PGEDGE_HOST_ID=host-1 PGEDGE_DATA_DIR=$(CIRCUS.ENV.WORKSPACE)/lima/data/host-1 PGEDGE_SYSTEMD__INSTANCE_DATA_DIR=$(CIRCUS.ENV.WORKSPACE)/lima/data/host-1/instances $(CIRCUS.ENV.WORKSPACE)/lima/pgedge-control-plane run --config-path $(CIRCUS.ENV.WORKSPACE)/lima/config.json | sed "s/^/[host-1] /"'

