[circus]

[watcher:host-1]
cmd = ssh 
args = -F $(CIRCUS.ENV.HOME)/.lima/control-plane-dev-1/ssh.config -tt lima-control-plane-dev-1 'sudo LIMA_DIR=$(CIRCUS.ENV.LIMA_DIR) $(CIRCUS.ENV.LIMA_DIR)/run.sh'

